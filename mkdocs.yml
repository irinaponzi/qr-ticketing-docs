site_name: EntradasQR - Documentation
site_description: Technical documentation for the EntradasQR ticket management platform
site_author: EntradasQR Team

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: es
          name: Español
          build: true
          nav_translations:
            Home: Inicio
            Architecture: Arquitectura
            Overview: Descripción general
            Domain-Driven Design: Diseño guiado por dominio
            Ports & Adapters: Puertos y Adaptadores
            Domain Model: Modelo de dominio
            Ticket Context: Contexto de Tickets
            Validator Context: Contexto de Validación
            Entity Diagrams: Diagramas de Entidades
            API Reference: Referencia de API
            Ticket API: API de Tickets
            Validator API: API de Validación
            Infrastructure: Infraestructura
            RabbitMQ & Events: RabbitMQ y Eventos
            Database Schema: Esquema de Base de Datos
            Docker Services: Servicios Docker
            Observability: Observabilidad
            Metrics & Prometheus: Métricas y Prometheus
            Logs & Loki: Logs y Loki
            Grafana Dashboards: Dashboards de Grafana
            Development: Desarrollo
            Getting Started: Primeros Pasos
            Testing Strategy: Estrategia de Testing
            Linting & Code Quality: Linting y Calidad de Código

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture/overview.md
      - Domain-Driven Design: architecture/ddd.md
      - Ports & Adapters: architecture/ports-and-adapters.md
  - Domain Model:
      - Ticket Context: domain/ticket-context.md
      - Validator Context: domain/validator-context.md
      - Entity Diagrams: domain/entity-diagrams.md
  - API Reference:
      - Ticket API: api/ticket-api.md
      - Validator API: api/validator-api.md
  - Infrastructure:
      - RabbitMQ & Events: infrastructure/rabbitmq.md
      - Database Schema: infrastructure/database.md
      - Docker Services: infrastructure/docker.md
  - Observability:
      - Metrics & Prometheus: observability/metrics.md
      - Logs & Loki: observability/logs.md
      - Grafana Dashboards: observability/grafana.md
  - Development:
      - Getting Started: development/getting-started.md
      - Testing Strategy: development/testing.md
      - Linting & Code Quality: development/linting.md
